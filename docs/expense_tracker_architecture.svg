<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a2e; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }

      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }

      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }

      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }

      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .c-gray .th { fill: #2C2C2A; }
      .c-gray .ts { fill: #5F5E5A; }

      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .c-purple .th { fill: #26215C; }
      .c-purple .ts { fill: #534AB7; }

      .c-coral rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .c-coral .th { fill: #4A1B0C; }
      .c-coral .ts { fill: #993C1D; }
    </style>
  </defs>

  <!-- Browser -->
  <g class="c-blue">
    <rect x="30" y="30" width="120" height="44" rx="8"/>
    <text class="th" x="90" y="48" text-anchor="middle" dominant-baseline="central">Browser</text>
    <text class="ts" x="90" y="64" text-anchor="middle" dominant-baseline="central">React + Vite</text>
  </g>

  <!-- Arrow: Browser → API -->
  <line x1="150" y1="52" x2="200" y2="52" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="175" y="44" text-anchor="middle">HTTP/REST</text>

  <!-- FastAPI box -->
  <g class="c-teal">
    <rect x="200" y="20" width="150" height="64" rx="8"/>
    <text class="th" x="275" y="44" text-anchor="middle" dominant-baseline="central">FastAPI Backend</text>
    <text class="ts" x="275" y="62" text-anchor="middle" dominant-baseline="central">Routers → Services</text>
  </g>

  <!-- Arrow: FastAPI → SQLModel -->
  <line x1="350" y1="52" x2="400" y2="52" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="375" y="44" text-anchor="middle">SQLModel</text>

  <!-- PostgreSQL -->
  <g class="c-amber">
    <rect x="400" y="20" width="140" height="64" rx="8"/>
    <text class="th" x="470" y="44" text-anchor="middle" dominant-baseline="central">PostgreSQL 15</text>
    <text class="ts" x="470" y="62" text-anchor="middle" dominant-baseline="central">Docker container</text>
  </g>

  <!-- Docker Compose envelope -->
  <rect x="180" y="110" width="390" height="380" rx="14" fill="none" stroke-dasharray="6 4" stroke="#888" stroke-width="1"/>
  <text class="ts" x="375" y="132" text-anchor="middle">docker-compose.yml</text>

  <!-- Backend folder -->
  <g class="c-teal">
    <rect x="195" y="145" width="170" height="330" rx="10"/>
    <text class="th" x="280" y="168" text-anchor="middle" dominant-baseline="central">backend/app/</text>
  </g>

  <!-- Files inside backend -->
  <g class="c-gray">
    <rect x="210" y="182" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="194" text-anchor="middle" dominant-baseline="central">main.py</text>
    <text class="ts" x="280" y="207" text-anchor="middle" dominant-baseline="central">App entry point</text>
  </g>
  <g class="c-gray">
    <rect x="210" y="222" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="234" text-anchor="middle" dominant-baseline="central">database.py</text>
    <text class="ts" x="280" y="247" text-anchor="middle" dominant-baseline="central">DB session setup</text>
  </g>
  <g class="c-gray">
    <rect x="210" y="262" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="274" text-anchor="middle" dominant-baseline="central">models.py</text>
    <text class="ts" x="280" y="287" text-anchor="middle" dominant-baseline="central">SQLModel tables</text>
  </g>
  <g class="c-gray">
    <rect x="210" y="302" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="314" text-anchor="middle" dominant-baseline="central">schemas.py</text>
    <text class="ts" x="280" y="327" text-anchor="middle" dominant-baseline="central">Pydantic I/O models</text>
  </g>
  <g class="c-purple">
    <rect x="210" y="342" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="354" text-anchor="middle" dominant-baseline="central">routers/</text>
    <text class="ts" x="280" y="367" text-anchor="middle" dominant-baseline="central">5 route files</text>
  </g>
  <g class="c-purple">
    <rect x="210" y="382" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="394" text-anchor="middle" dominant-baseline="central">services/</text>
    <text class="ts" x="280" y="407" text-anchor="middle" dominant-baseline="central">Business logic</text>
  </g>
  <g class="c-gray">
    <rect x="210" y="422" width="140" height="32" rx="6"/>
    <text class="th" x="280" y="434" text-anchor="middle" dominant-baseline="central">tests/</text>
    <text class="ts" x="280" y="447" text-anchor="middle" dominant-baseline="central">pytest suite</text>
  </g>

  <!-- Frontend folder -->
  <g class="c-blue">
    <rect x="385" y="145" width="170" height="230" rx="10"/>
    <text class="th" x="470" y="168" text-anchor="middle" dominant-baseline="central">frontend/src/</text>
  </g>

  <g class="c-gray">
    <rect x="400" y="182" width="140" height="32" rx="6"/>
    <text class="th" x="470" y="194" text-anchor="middle" dominant-baseline="central">components/</text>
    <text class="ts" x="470" y="207" text-anchor="middle" dominant-baseline="central">Reusable UI</text>
  </g>
  <g class="c-gray">
    <rect x="400" y="222" width="140" height="32" rx="6"/>
    <text class="th" x="470" y="234" text-anchor="middle" dominant-baseline="central">pages/</text>
    <text class="ts" x="470" y="247" text-anchor="middle" dominant-baseline="central">Dashboard, Expenses</text>
  </g>
  <g class="c-gray">
    <rect x="400" y="262" width="140" height="32" rx="6"/>
    <text class="th" x="470" y="274" text-anchor="middle" dominant-baseline="central">api/</text>
    <text class="ts" x="470" y="287" text-anchor="middle" dominant-baseline="central">Axios API calls</text>
  </g>
  <g class="c-gray">
    <rect x="400" y="302" width="140" height="32" rx="6"/>
    <text class="th" x="470" y="314" text-anchor="middle" dominant-baseline="central">App.jsx</text>
    <text class="ts" x="470" y="327" text-anchor="middle" dominant-baseline="central">Root component</text>
  </g>

  <!-- Docs box -->
  <g class="c-coral">
    <rect x="385" y="390" width="170" height="80" rx="10"/>
    <text class="th" x="470" y="413" text-anchor="middle" dominant-baseline="central">docs/</text>
    <text class="ts" x="470" y="430" text-anchor="middle" dominant-baseline="central">PRD · HLD · LLD</text>
    <text class="ts" x="470" y="448" text-anchor="middle" dominant-baseline="central">README.md</text>
  </g>

  <!-- .env label -->
  <g class="c-gray">
    <rect x="30" y="220" width="120" height="32" rx="6"/>
    <text class="th" x="90" y="232" text-anchor="middle" dominant-baseline="central">.env</text>
    <text class="ts" x="90" y="247" text-anchor="middle" dominant-baseline="central">DB_URL, secrets</text>
  </g>
  <line x1="150" y1="236" x2="194" y2="236" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
</svg>
