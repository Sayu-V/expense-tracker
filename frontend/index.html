<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first viewport — covers iOS notch / safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Home-screen meta -->
    <meta name="theme-color" content="#5E5CE6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Expense Tracker" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / description -->
    <meta name="description" content="Track expenses, income and budgets — Apple-inspired design with dark mode, AI categorisation and period filtering." />

    <!-- PWA manifest + icon -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <title>Expense Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- v2.2.0 — Service Worker for PWA offline mode -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then((reg) => console.info('[SW] registered', reg.scope))
            .catch((err) => console.warn('[SW] registration failed', err))
        })
      }
    </script>
  </body>
</html>
